<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">    
    <title>Document</title>
</head>
<body>  
    <h1>ROCKS PAPERS SCISSORS</h1>
    <div class="container">
        <div class="buttons">
            <button id="rock" class="button"><img class="img" id="rock" src=images/rock.jpg></button>
            <button id="paper" class="button"><img class="img" id="paper" src=images/paper.jpg></button>
            <button id="scissor" class="button"><img class="img" id="scissor" src=images/scissors.jpg></button>
        </div>
        <div id="vs">VS</div>
        <div class="reveal"><img id="toReveal" src=images/toreveal.jpg></div>
    </div>
    <div id="counters">
        <div id="wins" class="counter"> Player: 0 </div>
        <div id="draws" class="counter"> Draws: 0 </div>
        <div id="losses" class="counter"> Computer: 0 </div>
    </div>
<script src="script.js"></script>
</body>
</html>
